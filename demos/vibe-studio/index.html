<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibePage Playground · UniAdapter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --green: #07c160;
      --blue: #388bfd;
      --red: #f85149;
      --yellow: #f0a020;
      --purple: #a371f7;
      --radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
    }
    .header-logo {
      font-size: 18px;
    }
    .header-title {
      font-weight: 700;
      font-size: 14px;
    }
    .header-sub {
      color: var(--text2);
      font-size: 12px;
    }
    .header-right {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .header-badge {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      color: var(--green);
    }
    .btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      padding: 5px 12px;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .btn:hover { background: var(--border); }
    .btn-primary {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
      font-weight: 600;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-danger { border-color: var(--red); color: var(--red); }

    /* ── Main ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left panel: prompt ── */
    .panel-left {
      width: 380px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .panel-left-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      padding: 8px 16px;
      font-size: 12px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: var(--text2);
    }
    .tab.active {
      color: var(--text);
      border-bottom-color: var(--green);
    }
    .panel-left-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
    }

    /* Platform selector */
    .platform-selector {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .platform-btn {
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      background: var(--bg2);
      color: var(--text2);
      font-family: inherit;
    }
    .platform-btn.active {
      border-color: var(--green);
      color: var(--green);
      background: rgba(7, 193, 96, 0.1);
    }

    /* Prompt textarea */
    .prompt-area {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 12px;
      resize: none;
      min-height: 120px;
      outline: none;
      line-height: 1.6;
    }
    .prompt-area:focus { border-color: var(--green); }

    /* Suggestions */
    .suggestions {
      margin-top: 14px;
    }
    .suggestions-label {
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 8px;
    }
    .suggestion-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .suggestion {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text);
      text-align: left;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .suggestion:hover { border-color: var(--green); }
    .suggestion-emoji { margin-right: 6px; }

    /* Settings */
    .settings {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .settings-label {
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 6px;
    }
    .settings-row {
      margin-bottom: 10px;
    }
    .settings-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 6px 10px;
      outline: none;
    }
    .settings-input:focus { border-color: var(--blue); }
    .settings-note {
      font-size: 11px;
      color: var(--text2);
      margin-top: 4px;
    }

    /* History */
    .history-label {
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 8px;
    }
    .history-item {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text);
      background: var(--bg2);
      font-family: inherit;
      text-align: left;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .history-item:hover { border-color: var(--blue); color: var(--blue); }

    /* ── Right panel: output ── */
    .panel-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .output-tabs {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding: 0 14px;
      flex-shrink: 0;
      background: var(--bg2);
    }
    .output-tab {
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text2);
      border-bottom: 2px solid transparent;
    }
    .output-tab.active {
      color: var(--text);
      border-bottom-color: var(--blue);
    }
    .output-tab-new {
      margin-left: auto;
      color: var(--green);
      font-size: 12px;
    }
    .output-content {
      flex: 1;
      overflow-y: auto;
    }

    /* Empty state */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 14px;
      color: var(--text2);
    }
    .empty-emoji { font-size: 48px; }
    .empty h3 { font-size: 16px; font-weight: 600; color: var(--text); }
    .empty p { font-size: 13px; max-width: 400px; text-align: center; line-height: 1.6; }
    .empty-steps {
      display: flex;
      gap: 16px;
      margin-top: 8px;
    }
    .empty-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .empty-step-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid var(--border);
    }
    .empty-step-text { font-size: 11px; }

    /* Streaming message */
    .msg-user {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      align-items: flex-start;
    }
    .msg-avatar-u {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0;
    }
    .msg-bubble-u {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px 12px 12px 4px;
      padding: 10px 14px;
      max-width: 70%;
      line-height: 1.6;
    }

    .msg-assistant {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      align-items: flex-start;
    }
    .msg-avatar-a {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #07c160, #06ad56);
      display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0;
    }
    .msg-status {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 16px;
      font-size: 11px;
      color: var(--text2);
      border-bottom: 1px solid var(--border);
    }
    .msg-status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      animation: pulse 1.5s infinite;
    }
    .msg-typing {
      display: inline-block;
      width: 16px;
      height: 16px;
    }
    .msg-typing::after {
      content: '';
      display: block;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 1s infinite;
      margin: 6px auto;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Code files */
    .files-list {
      padding: 12px 16px;
    }
    .file-item {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 10px;
    }
    .file-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .file-name {
      font-size: 12px; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
    }
    .file-lang-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      background: var(--bg3);
      color: var(--purple);
    }
    .file-actions {
      display: flex; gap: 5px;
    }
    .file-action {
      font-size: 11px;
      padding: 2px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      background: none;
      color: var(--text2);
      font-family: inherit;
    }
    .file-action:hover { color: var(--text); border-color: var(--text2); }
    .file-action.copied { color: var(--green); border-color: var(--green); }
    .file-code {
      background: var(--bg);
      overflow: auto;
      max-height: 350px;
    }
    .file-code pre {
      margin: 0;
      padding: 12px;
      font-size: 12px;
      line-height: 1.7;
      white-space: pre;
    }

    /* Info banner */
    .info-banner {
      background: rgba(7, 193, 96, 0.1);
      border: 1px solid var(--green);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin: 12px 16px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--green);
    }

    /* Error */
    .error-msg {
      margin: 12px 16px;
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid var(--red);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--red);
      font-size: 12px;
    }

    /* Welcome cards (for demo mode) */
    .demo-cards {
      padding: 14px;
    }
    .demo-cards-title {
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .demo-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .demo-card:hover { border-color: var(--green); }
    .demo-card-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .demo-card-desc {
      font-size: 11px;
      color: var(--text2);
      line-height: 1.5;
    }
    .demo-card-platforms {
      margin-top: 6px;
      display: flex;
      gap: 4px;
    }
    .demo-card-pf {
      font-size: 10px;
      padding: 1px 6px;
      background: var(--bg3);
      border-radius: 4px;
      color: var(--text2);
    }

    /* Syntax highlight colors */
    .hl-keyword { color: #ff7b72; font-weight: 600; }
    .hl-string { color: #a5d6ff; }
    .hl-comment { color: #8b949e; font-style: italic; }
    .hl-prop { color: #79c0ff; }
    .hl-number { color: #ffa657; }
    .hl-fn { color: #d2a8ff; }
    .hl-tag { color: #7ee787; }
    .hl-attr { color: #ffa657; }
    .hl-value { color: #a5d6ff; }
    .hl-punctuation { color: #8b949e; }

    /* Responsive */
    @media (max-width: 700px) {
      .panel-left { width: 100%; border-right: none; border-bottom: 1px solid var(--border); max-height: 40vh; }
      .main { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="header-logo">✨</span>
  <span class="header-title">VibePage Playground</span>
  <span class="header-sub">· AI 一句话生成小程序页面</span>
  <div class="header-right">
    <span class="header-badge">● UniAdapter v2.0</span>
    <button class="btn" onclick="shareResult()" title="分享">🔗 分享</button>
    <button class="btn" onclick="downloadZip()" title="下载">📦 下载</button>
    <button class="btn btn-danger" onclick="clearAll()">🗑 清空</button>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Left panel -->
  <div class="panel-left">
    <div class="panel-left-tabs">
      <div class="tab active" id="tab-prompt" onclick="switchTab('prompt')">💬 生成</div>
      <div class="tab" id="tab-demo" onclick="switchTab('demo')">🎨 示例</div>
      <div class="tab" id="tab-history" onclick="switchTab('history')">📜 历史</div>
    </div>

    <!-- Prompt tab -->
    <div id="panel-prompt" class="panel-left-body">
      <!-- Platform selector -->
      <div class="platform-selector" id="platform-selector">
        <button class="platform-btn active" data-platform="weapp" onclick="selectPlatform(this)">微信小程序</button>
        <button class="platform-btn" data-platform="alipay" onclick="selectPlatform(this)">支付宝</button>
        <button class="platform-btn" data-platform="douyin" onclick="selectPlatform(this)">抖音小程序</button>
        <button class="platform-btn" data-platform="h5" onclick="selectPlatform(this)">H5 / Web</button>
      </div>

      <!-- Prompt -->
      <textarea
        id="prompt-input"
        class="prompt-area"
        placeholder="描述你想要的小程序页面...

例如：帮我做一个商品详情页、用户登录页、搜索结果页、个人中心..."
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();generate()}"
      ></textarea>

      <!-- Generate button -->
      <button class="btn btn-primary" style="width:100%;margin-top:10px;justify-content:center;padding:10px" onclick="generate()" id="gen-btn">
        ✨ 生成页面
      </button>

      <!-- Suggestions -->
      <div class="suggestions">
        <div class="suggestions-label">试试这些 · Quick Examples</div>
        <div class="suggestion-grid" id="suggestions"></div>
      </div>

      <!-- Settings -->
      <div class="settings">
        <div class="settings-label">⚙️ API 配置（可选 / Optional）</div>
        <div class="settings-row">
          <div class="settings-note">填入 OpenRouter API Key 以使用 AI 生成，否则使用内置示例</div>
          <input type="password" id="api-key" class="settings-input" placeholder="sk-or-..." style="margin-top:6px" />
        </div>
        <div class="settings-row">
          <select id="model-select" class="settings-input" style="width:100%">
            <optgroup label="Claude">
              <option value="anthropic/claude-3.5-sonnet" selected>Claude 3.5 Sonnet</option>
              <option value="anthropic/claude-3-haiku">Claude 3 Haiku</option>
            </optgroup>
            <optgroup label="GPT">
              <option value="openai/gpt-4o">GPT-4o</option>
              <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
            </optgroup>
            <optgroup label="Gemini">
              <option value="google/gemini-2.0-flash">Gemini 2.0 Flash</option>
            </optgroup>
            <optgroup label="DeepSeek">
              <option value="deepseek/deepseek-chat-v3">DeepSeek V3</option>
            </optgroup>
          </select>
        </div>
      </div>
    </div>

    <!-- Demo tab -->
    <div id="panel-demo" class="panel-left-body" style="display:none">
      <div class="demo-cards-title">内置示例 · Built-in Demos</div>
      <div id="demo-cards"></div>
    </div>

    <!-- History tab -->
    <div id="panel-history" class="panel-left-body" style="display:none">
      <div class="history-label">生成历史（本地存储）</div>
      <div id="history-list"></div>
      <button class="btn" style="width:100%;margin-top:10px" onclick="clearHistory()">清空历史</button>
    </div>
  </div>

  <!-- Right panel -->
  <div class="panel-right">
    <div class="output-tabs">
      <div class="output-tab active">📄 代码输出</div>
      <div class="output-tab-new" id="file-count"></div>
    </div>
    <div class="output-content" id="output-content">
      <div class="empty" id="empty-state">
        <div class="empty-emoji">✨</div>
        <h3>告诉 AI 你想要什么页面</h3>
        <p>描述你的需求，VibePage 立即生成完整的小程序页面源代码。<br/>支持微信、支付宝、抖音、H5 四端。</p>
        <div class="empty-steps">
          <div class="empty-step">
            <div class="empty-step-num">1</div>
            <div class="empty-step-text">描述页面需求</div>
          </div>
          <div class="empty-step">
            <div class="empty-step-num">2</div>
            <div class="empty-step-text">AI 生成代码</div>
          </div>
          <div class="empty-step">
            <div class="empty-step-num">3</div>
            <div class="empty-step-text">复制到项目</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  platform: 'weapp',
  messages: [],
  generating: false,
  abortCtrl: null,
  currentFiles: [],
  history: JSON.parse(localStorage.getItem('vibe_history') || '[]'),
  currentPrompt: '',
}

const suggestions = [
  '帮我做一个商品详情页，包含商品图片、名称、价格、购买按钮',
  '用户登录和注册页面，支持手机号验证码登录',
  '搜索结果列表页，支持筛选和排序',
  '个人中心页面，包含用户信息、订单、设置入口',
  '帮我做一个订单确认页，包含商品列表、地址、支付方式',
  '文章详情页，支持标题、作者、发布时间、正文内容',
];

const demos = [
  {
    title: '商品详情页',
    desc: '包含轮播图、商品信息、规格选择、加购按钮、店铺入口',
    platforms: ['weapp', 'alipay', 'douyin', 'h5'],
    prompt: '帮我做一个商品详情页，包含商品图片轮播、商品名称、价格（原价和现价）、规格选择（颜色/尺码）、加购按钮、店铺入口、相似商品推荐',
  },
  {
    title: '用户登录页',
    desc: '支持手机号+验证码登录、微信一键登录、用户协议勾选',
    platforms: ['weapp', 'alipay', 'douyin', 'h5'],
    prompt: '用户登录注册页面，支持手机号验证码登录、微信一键登录、用户协议和隐私政策勾选、记住登录状态',
  },
  {
    title: '搜索列表页',
    desc: '搜索框、筛选标签、排序方式、商品列表卡片',
    platforms: ['weapp', 'alipay', 'douyin', 'h5'],
    prompt: '搜索结果列表页，顶部搜索框可修改关键词，筛选标签（综合/销量/价格），排序按钮，商品卡片列表展示图片/标题/价格/销量',
  },
  {
    title: '个人中心',
    desc: '用户头像、会员等级、订单入口、资产、设置',
    platforms: ['weapp', 'alipay', 'douyin', 'h5'],
    prompt: '个人中心页面，头像昵称和会员等级，四个订单入口（待付款/待发货/待收货/已完成），我的资产（积分/优惠券/余额），功能列表（收货地址/设置/关于我们）',
  },
  {
    title: '订单确认页',

// ── Generate ─────────────────────────────────────────────────────────────────
async function generate() {
  const prompt = document.getElementById('prompt-input').value.trim();
  if (!prompt || state.generating) return;

  const apiKey = document.getElementById('api-key').value.trim();
  const model = document.getElementById('model-select').value;

  state.currentPrompt = prompt;
  state.generating = true;
  state.currentFiles = [];
  state.messages.push({ role: 'user', content: prompt, files: [] });
  renderMessages();
  setGenBtnState(true);
  document.getElementById('empty-state').style.display = 'none';

  // If no API key, use built-in demo with realistic response
  if (!apiKey) {
    await generateDemo(prompt, model);
    return;
  }

  // Real AI generation
  state.abortCtrl = new AbortController();
  const userMsgId = Date.now();

  try {
    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`,
        'HTTP-Referer': location.href,
        'X-Title': 'UniAdapter VibePage Playground',
      },
      body: JSON.stringify({
        model: model,
        messages: [
          { role: 'system', content: systemPrompt(state.platform) },
          { role: 'user', content: `目标平台：${state.platform}。需求：${prompt}` },
        ],
        stream: true,
        temperature: 0.3,
        max_tokens: 4000,
      }),
      signal: state.abortCtrl.signal,
    });

    if (!response.ok) {
      const err = await response.text();
      addError(`API 错误 (${response.status}): ${err}`);
      state.generating = false;
      setGenBtnState(false);
      return;
    }

    if (!response.body) throw new Error('流式响应不可用');

    let fullContent = '';
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    // Create assistant message placeholder
    state.messages.push({ role: 'assistant', content: '', files: [], streaming: true });
    renderMessages();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const json = JSON.parse(data);
          const chunk = json.choices?.[0]?.delta?.content;
          if (chunk) {
            fullContent += chunk;
            updateAssistantContent(fullContent);
          }
        } catch {}
      }
    }

    const files = parseFiles(fullContent);
    state.messages = state.messages.map(m =>
      m.streaming ? { ...m, content: fullContent, files, streaming: false } : m
    );
    state.currentFiles = files;
    saveToHistory(prompt, files);
    renderMessages();
    document.getElementById('file-count').textContent = `生成 ${files.length} 个文件 ✅`;

  } catch (err) {
    if (err.name !== 'AbortError') {
      addError(err.message || '生成失败');
    }
  } finally {
    state.generating = false;
    setGenBtnState(false);
  }
}

async function generateDemo(prompt, model) {
  // Simulate AI generation with realistic demo output
  const demoOutput = buildDemoOutput(prompt, state.platform);
  const files = parseFiles(demoOutput);

  state.messages.push({ role: 'assistant', content: demoOutput, files: [], streaming: true });
  renderMessages();
  setGenBtnState(true);

  // Simulate streaming delay
  await new Promise(resolve => setTimeout(resolve, 800));
  state.messages = state.messages.map(m =>
    m.streaming ? { ...m, content: demoOutput, files, streaming: false } : m
  );
  state.currentFiles = files;
  saveToHistory(prompt, files);
  renderMessages();
  setGenBtnState(false);
  state.generating = false;
  document.getElementById('file-count').textContent = `生成 ${files.length} 个文件 ✅`;
  document.getElementById('file-count').style.color = 'var(--green)';
}

function addError(msg) {
  state.messages.push({ role: 'assistant', content: '', files: [], error: msg });
  renderMessages();
}

function updateAssistantContent(content) {
  const files = parseFiles(content);
  const last = state.messages[state.messages.length - 1];
  if (last && last.streaming) {
    last.content = content;
    if (files.length > 0) last.files = files;
    renderMessages();
  }
}

function stopGenerate() {
  if (state.abortCtrl) state.abortCtrl.abort();
  state.generating = false;
  setGenBtnState(false);
  state.messages = state.messages.map(m =>
    m.streaming ? { ...m, streaming: false } : m
  );
  renderMessages();
}

function setGenBtnState(generating) {
  const btn = document.getElementById('gen-btn');
  if (generating) {
    btn.innerHTML = '⏹ 停止生成';
    btn.onclick = stopGenerate;
    btn.style.background = 'var(--red)';
    btn.style.borderColor = 'var(--red)';

    btn.innerHTML = '✨ 生成页面';
    btn.onclick = generate;
    btn.style.background = '';
    btn.style.borderColor = '';
  }
}

// ── Parsing ──────────────────────────────────────────────────────────────────
function parseFiles(content) {
  const files = [];
  // Match ---FILE:filename--- ... ``` ... ```
  const filePattern = /---FILE:([^\n]+)---\s*\n?([\s\S]*?)(?=---FILE:|$)/g;
  let match;
  while ((match = filePattern.exec(content)) !== null) {
    const fname = match[1].trim();
    const body = match[2].trim();
    // Remove language markers <LANG:typescript> etc.
    const clean = body
      .replace(/<LANG:(\w+)>\n?/g, '')
      .replace(/<\/CODEBLOCK>/g, '')
      .trim();
    if (clean && clean.length > 10) {
      files.push({
        filename: fname,
        content: clean,
        lang: detectLang(fname),
      });
    }
  }
  // Fallback
  if (files.length === 0 && content.trim().length > 50) {
    files.push({
      filename: state.platform === 'weapp' ? 'pages/demo/index.ts' :
                state.platform === 'alipay' ? 'pages/demo/index.ts' :
                state.platform === 'douyin' ? 'pages/demo/index.ts' : 'pages/demo/index.tsx',
      content: content.trim(),
      lang: 'typescript',
    });
  }
  return files;
}

function detectLang(filename) {
  if (/wxml|axml|ttml/.test(filename)) return 'wxml';
  if (/wxss|acss|ttss/.test(filename)) return 'css';
  if (/json/.test(filename)) return 'json';
  if (/tsx/.test(filename)) return 'tsx';
  return 'typescript';
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderMessages() {
  const container = document.getElementById('output-content');

  let html = '';
  for (const msg of state.messages) {
    if (msg.role === 'user') {
      html += `
        <div class="msg-user">
          <div class="msg-avatar-u">👤</div>
          <div class="msg-bubble-u">${escapeHtml(msg.content)}</div>
        </div>`;
    } else if (msg.role === 'assistant') {
      if (msg.error) {
        html += `
        <div class="msg-assistant">
          <div class="msg-avatar-a">✨</div>
          <div style="flex:1">
            <div class="error-msg">❌ ${escapeHtml(msg.error)}</div>
          </div>
        </div>`;
      } else {
        html += `
        <div class="msg-assistant">
          <div class="msg-avatar-a">✨</div>
          <div style="flex:1">
            <div class="msg-status">
              ${msg.streaming
                ? '<span class="msg-status-dot"></span><span>生成中...</span>'
                : '<span>✅ 已生成</span>'}
            </div>
            ${msg.files && msg.files.length > 0
              ? msg.files.map((f, i) => renderFile(f, i)).join('')
              : msg.streaming
                ? `<div style="padding:12px 16px;font-size:12px;color:var(--text2);font-family:inherit">
                     ${escapeHtml(msg.content.slice(-200))}<span style="animation:blink 1s infinite;color:var(--green)">▊</span>
                   </div>`
                : ''}
          </div>
        </div>`;
      }
    }
  }

  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

function renderFile(file, idx) {
  const langColors = {
    typescript: '#3178c6', tsx: '#3178c6', javascript: '#f7df1e',
    wxml: '#07c160', axml: '#1677ff', ttml: '#ff6b6b',
    css: '#264de4', wxss: '#264de4', acss: '#1677ff',
    json: '#f0a020', jsx: '#61dafb',
  };
  const color = langColors[file.lang] || '#8b949e';
  return `
    <div class="files-list">
      <div class="file-item">
        <div class="file-header">
          <div class="file-name">
            📄 ${file.filename}
            <span class="file-lang-badge" style="color:${color}">${file.lang}</span>
          </div>
          <div class="file-actions">
            <button class="file-action" id="copy-${idx}" onclick="copyFile(${idx})">📋 复制</button>
            <button class="file-action" onclick="downloadFile(${idx})">💾 下载</button>
          </div>
        </div>
        <div class="file-code">
          <pre><code>${highlight(file.content, file.lang)}</code></pre>
        </div>
      </div>
    </div>`;
}

// ── Syntax highlight ─────────────────────────────────────────────────────────
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(code, lang) {
  let text = escapeHtml(code);

  // Comments
  text = text.replace(/(\/\/[^\n]*|\/\*[\s\S]*?\*\/|# [^\n]*)/g,
    '<span class="hl-comment">$1</span>');

  // Strings
  text = text.replace(/('(?:[^'\\]|\\.)*'|"(?:[^"\\]|\\.)*"|`(?:[^`\\]|\\.)*`)/g,
    '<span class="hl-string">$1</span>');

  // Keywords
  const kw = ['import','export','from','const','let','var','function','return',
    'if','else','for','while','class','interface','type','async','await','new',
    'this','extends','implements','default','Page','Component','useState',
    'useEffect','useUniState','useUniRouter','useUniRequest','usePlatform',
    'importPage','usePlugin','getPlatformCapabilities'];
  for (const k of kw) {
    text = text.replace(new RegExp(`\\b(${k})\\b`, 'g'),
      '<span class="hl-keyword">$1</span>');
  }

  // Properties
  text = text.replace(/(\w+)(?=\s*:(?![:]))/g,
    '<span class="hl-prop">$1</span>');

  // Numbers
  text = text.replace(/\b(\d+(?:\.\d+)?)\b/g,
    '<span class="hl-number">$1</span>');

  // Tags (for XML/HTML)
  if (['wxml','axml','ttml'].includes(lang)) {
    text = text.replace(/(&lt;\/?)(\w+)/g, '$1<span class="hl-tag">$2</span>');
    text = text.replace(/(\s)(\w[\w-]*)(=)/g, '$1<span class="hl-attr">$2</span>$3');
    text = text.replace(/"([^"]*)"/g, '"<span class="hl-value">$1</span>"');
  }

  return text;
}

// ── Actions ──────────────────────────────────────────────────────────────────
async function copyFile(idx) {
  const file = state.currentFiles[idx];
  if (!file) return;
  await navigator.clipboard.writeText(file.content);
  const btn = document.getElementById('copy-' + idx);
  btn.textContent = '✅ 已复制';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = '📋 复制';
    btn.classList.remove('copied');
  }, 2000);
}

function downloadFile(idx) {
  const file = state.currentFiles[idx];
  if (!file) return;
  const blob = new Blob([file.content], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = file.filename.split('/').pop();
  a.click();
}

function downloadZip() {
  if (!state.currentFiles.length) {
    alert('先生成代码再下载');
    return;
  }
  // Simple approach: download each file separately
  state.currentFiles.forEach((f, i) => downloadFile(i));
}

function shareResult() {
  const p = encodeURIComponent(state.currentPrompt);
  const url = `${location.origin}${location.pathname}?prompt=${p}&platform=${state.platform}`;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.querySelector('[onclick="shareResult()"]');
    const orig = btn.textContent;
    btn.textContent = '✅ 链接已复制!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}
