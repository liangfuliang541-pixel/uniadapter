<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="200" cy="200" r="190" fill="url(#bg)" />
  <circle cx="200" cy="200" r="170" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" />
  
  <!-- U 字母主体 -->
  <text x="200" y="230" 
        font-family="'Segoe UI', Arial, sans-serif" 
        font-size="180" 
        font-weight="700" 
        fill="white" 
        text-anchor="middle"
        filter="url(#glow)">U</text>
  
  <!-- 适配箭头 - 左侧 -->
  <g transform="translate(200, 200)">
    <path d="M -120 -60 Q -100 -60 -80 -40 L -40 0 Q -30 10 -30 20 Q -30 30 -40 40 L -80 80 Q -100 100 -120 100" 
          fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
    <polygon points="-120,85 -120,115 -100,100" fill="url(#accent)"/>
  </g>
  
  <!-- 适配箭头 - 右侧 -->
  <g transform="translate(200, 200)">
    <path d="M 120 -60 Q 100 -60 80 -40 L 40 0 Q 30 10 30 20 Q 30 30 40 40 L 80 80 Q 100 100 120 100" 
          fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
    <polygon points="120,85 120,115 100,100" fill="url(#accent)"/>
  </g>
  
  <!-- 顶部连接线 -->
  <g transform="translate(200, 200)">
    <line x1="-120" y1="-60" x2="0" y2="-130" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
    <line x1="120" y1="-60" x2="0" y2="-130" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="-130" r="8" fill="url(#accent)" filter="url(#glow)"/>
  </g>
  
  <!-- 平台小图标 -->
  <g transform="translate(200, 200)" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">
    <!-- Web -->
    <circle cx="-140" cy="0" r="22" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <text x="-140" y="5" font-size="10">Web</text>
    
    <!-- 小程序 -->
    <circle cx="0" cy="-155" r="22" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <text x="0" y="-148" font-size="7">Mini</text>
    
    <!-- App -->
    <circle cx="140" cy="0" r="22" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <text x="140" y="5" font-size="12">App</text>
  </g>
  
  <!-- 底部文字 -->
  <text x="200" y="340" 
        font-family="'Segoe UI', Arial, sans-serif" 
        font-size="28" 
        font-weight="600" 
        fill="white" 
        text-anchor="middle"
        letter-spacing="4">ADAPTER</text>
</svg>
